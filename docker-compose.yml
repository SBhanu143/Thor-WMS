version: '3.8'

services:
  # Database engine: PostgreSQL production
  wms_postgres:
    image: postgres:15-alpine
    container_name: wms_postgres
    environment:
      POSTGRES_DB: wms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: wms_secret_password_12345
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  # Backend REST API server
  wms_api:
    build: ./backend
    container_name: wms_api
    environment:
      PORT: 5000
      DB_HOST: wms_postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: wms_secret_password_12345
      DB_NAME: wms
      JWT_SECRET: super_secret_production_key_thor_wms_98765
    ports:
      - "5000:5000"
    depends_on:
      - wms_postgres
    restart: always

  # Web static front client served by Nginx
  wms_web:
    build: ./web
    container_name: wms_web
    ports:
      - "8080:80"
    depends_on:
      - wms_api
    restart: always

volumes:
  postgres_data:
